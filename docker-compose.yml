version: '3.8'

services:
  api:
    build: .
    container_name: todo-api-service
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=db
      - POSTGRES_DB=todo_db
      - POSTGRES_USER=todo_user
      - POSTGRES_PASSWORD=todo_pass
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: todo-db-service
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data # Volume de persistance pour les donnees SQL
    ports:
      - "5432:5432"

volumes:
  postgres-data: # Declaration du volume nomme gere par Docker