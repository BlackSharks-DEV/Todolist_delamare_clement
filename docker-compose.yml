version: '3.8'

services:
  api:
    build: .
    container_name: todo-api-service
    ports:
      - "3000:3000" # Toujours exposé avec ports car on VEUT y accéder depuis notre PC
    environment:
      - NODE_ENV=${NODE_ENV}
      - DB_HOST=${DB_HOST}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - frontend
      - backend
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: todo-db-service
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432" # Utilisation de expose à la place de ports !
    networks:
      - backend

volumes:
  postgres-data:

networks:
  frontend:
  backend: