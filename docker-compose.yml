version: '3.8'

services:
  api:
    build: .
    container_name: todo-api-service
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=db # Utilise le DNS automatique de Docker pour cibler le service db
      - POSTGRES_DB=todo_db
      - POSTGRES_USER=todo_user
      - POSTGRES_PASSWORD=todo_pass
    networks:
      - frontend
      - backend
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: todo-db-service
    environment:
      POSTGRES_DB: todo_db
      POSTGRES_USER: todo_user
      POSTGRES_PASSWORD: todo_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend # La BDD est uniquement sur le réseau privé backend
    # Note : Nous enlevons volontairement le mappage "ports:" pour bloquer l'accès extérieur !

volumes:
  postgres-data:

networks:
  frontend: # Réseau pour l'exposition publique
  backend:  # Réseau privé et étanche pour la BDD