apiVersion: v1
kind: Namespace
metadata:
  name: todo-app-namespace
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
  namespace: todo-app-namespace
spec:
  replicas: 2 
  strategy:
    type: RollingUpdate 
    rollingUpdate:
      maxSurge: 1       
      maxUnavailable: 0 
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
        - name: todo-api
          image: blacksharksdev/todo-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            - name: DB_HOST
              value: "db-service"
            - name: POSTGRES_USER
              value: "todo_user"
            - name: POSTGRES_PASSWORD
              value: "le_mot_de_passe_ultra_secret_de_prod"
            - name: POSTGRES_DB
              value: "todo_db"
---
apiVersion: v1
kind: Service
metadata:
  name: todo-api-service
  namespace: todo-app-namespace
spec:
  type: NodePort
  selector:
    app: todo-api
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 32000