name: Todo API CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- PHASE 1 : VALIDATION GLOBALE (LINT) ---
  job-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Exécuter le Linter
        run: npm run lint

  # --- PHASE 2 : TESTS AVEC SERVICE POSTGRESQL (MATRIX) ---
  job-test:
    runs-on: ubuntu-latest
    needs: job-lint
    
    strategy:
      matrix:
        node-version: [18, 20]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Node.js (Version ${{ matrix.node-version }})
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Exécuter les tests unitaires
        run: npm test

      - name: Exécuter les tests d'intégration (Connexion BDD)
        run: npm run test:integration
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass

  # --- PHASE 3 : BUILD & PUSH DOCKERHUB ---
  build-and-push:
    runs-on: ubuntu-latest
    needs: job-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Connexion sécurisée à DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraire le SHA court du commit
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Construire et pousser l'image Multi-Stage
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/todo-api:latest
            ${{ secrets.DOCKERHUB_USER }}/todo-api:${{ steps.vars.outputs.sha_short }}

  # --- PHASE 4 : DÉPLOIEMENT SUR K3S (Corrigé et aligné sur 'jobs:') ---
  deploy-to-k3s:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Transférer les manifestes YAML sur le serveur K3S
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "k8s/*"
          target: "~/todo-deploy"

      - name: Appliquer la configuration sur le cluster K3S
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            kubectl apply -f ~/todo-deploy/k8s/database.yaml
            kubectl apply -f ~/todo-deploy/k8s/api.yaml
            kubectl rollout restart deployment/todo-api -n todo-app-namespace