name: Todo API CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      - run: npm ci
      - run: npm test
      - run: npm run test:integration
        env:
          DB_HOST: localhost
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass

  # --- STAGE BUILD (PHASE 3) ---
  build-and-push:
    runs-on: ubuntu-latest
    needs: test # N'exécute le build que si les tests sont passés au vert !
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Se connecter à DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extraire l'identifiant court du commit Git (SHA)
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Compiler et pousser l'image Docker (Multi-stage)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Double marquage demandé : version stable latest + version taguée avec le commit SHA
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/todo-api:latest
            ${{ secrets.DOCKERHUB_USER }}/todo-api:${{ steps.vars.outputs.sha_short }}