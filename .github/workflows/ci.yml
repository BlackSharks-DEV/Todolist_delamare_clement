name: Todo API CI/CD Pipeline

# Déclencheur strict : Branche principale uniquement pour le build final
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # --- PHASE 1 : VALIDATION GLOBALE (LINT) ---
  job-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Exécuter le Linter
        run: npm run lint

  # --- PHASE 2 : TESTS AVEC SERVICE POSTGRESQL (MATRIX) ---
  job-test:
    runs-on: ubuntu-latest
    needs: job-lint # Fail Fast : On bloque si le lint échoue
    
    # Utilisation d'une Matrix pour valider plusieurs versions de Node (Bonus barème)
    strategy:
      matrix:
        node-version: [18, 20]

    # Déclaration du service PostgreSQL éphémère (Critère Isolation)
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      - name: Configurer Node.js (Version ${{ matrix.node-version }})
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Installer les dépendances
        run: npm ci

      - name: Exécuter les tests unitaires
        run: npm test

      - name: Exécuter les tests d'intégration (Connexion BDD)
        run: npm run test:integration
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          POSTGRES_DB: todo_test
          POSTGRES_USER: todo_user
          POSTGRES_PASSWORD: todo_pass

  # --- PHASE 3 : BUILD & PUSH DOCKERHUB (SECRETS & TRACABILITÉ) ---
  build-and-push:
    runs-on: ubuntu-latest
    needs: job-test # S'assure que tous les tests de la matrix sont au vert
    
    # Équivalent du 'rules:' de GitLab : On ne build QUE si on est sur la branche main
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Récupérer le code source
        uses: actions/checkout@v4

      # Gestion sécurisée des secrets (Critère "Pas de secrets en clair")
      - name: Connexion sécurisée à DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Génération du tag de traçabilité court (Critère "Double tagging")
      - name: Extraire le SHA court du commit
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Construire et pousser l'image Multi-Stage
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Application stricte du double tagging requis par le barème
          tags: |
            ${{ secrets.DOCKERHUB_USER }}/todo-api:latest
            ${{ secrets.DOCKERHUB_USER }}/todo-api:${{ steps.vars.outputs.sha_short }}


# --- STAGE DEPLOY (PHASE 4) ---
    deploy-to-k3s:
      runs-on: ubuntu-latest
      needs: build-and-push # Seulement si le build DockerHub a réussi
      if: github.ref == 'refs/heads/main'
    
      steps:
        - name: Récupérer le code source
          uses: actions/checkout@v4

        - name: Transférer les manifestes YAML sur le serveur K3S
          uses: appleboy/scp-action@v0.1.7
          with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SERVER_USER }}
            key: ${{ secrets.SERVER_SSH_KEY }}
            source: "k8s/*"
            target: "~/todo-deploy"

        - name: Appliquer la configuration sur le cluster K3S
          uses: appleboy/ssh-action@v1.0.3
          with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SERVER_USER }}
            key: ${{ secrets.SERVER_SSH_KEY }}
            script: |
              kubectl apply -f ~/todo-deploy/k8s/api.yaml
              kubectl apply -f ~/todo-deploy/k8s/database.yaml
              kubectl rollout restart deployment/todo-api -n todo-app-namespace